# Airflow (LocalExecutor) for the ReviewBay pipeline.
# Run from the repo root:
#   docker compose -f airflow/docker-compose.airflow.yml up --build
#
# Reuses the project's .env for source + Neon Postgres creds.

x-airflow-common: &airflow-common
  build:
    context: ..                      # repo root, so the image can COPY src/
    dockerfile: airflow/Dockerfile
  env_file: ../.env                  # Apify / Neon / Claude creds for tasks
  environment: &airflow-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
    # Where the DAG reads brands from (mounted below):
    BRANDS_CONFIG: /opt/airflow/config/brands.yml
    PYTHONPATH: /opt/airflow/project_src
  volumes:
    - ./dags:/opt/airflow/dags
    - ../config:/opt/airflow/config:ro     # brands.yml
    - airflow-logs:/opt/airflow/logs
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 10

  # One-shot: migrate the metadata DB and create the admin user.
  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate &&
        airflow users create --username admin --password admin \
          --firstname admin --lastname admin --role Admin --email admin@example.com \
          || true
    restart: "no"

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully

volumes:
  airflow-pgdata:
  airflow-logs:
