<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ReviewBay Chat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/theme.css">
<script src="/static/brands.js"></script>
<style>
  .chatwrap { max-width:820px; margin:0 auto; padding:24px 16px 132px; }
  .msg { margin:16px 0; }
  .msg.user { display:flex; }
  .msg.user .bubble { background:var(--accent); color:#fff; border-color:var(--accent); margin-left:auto; box-shadow:none; }
  .bubble { background:var(--surface); border:1px solid var(--line); padding:13px 16px; border-radius:14px;
            max-width:88%; white-space:pre-wrap; line-height:1.6; box-shadow:var(--shadow); }
  .bubble.intro { background:transparent; border:none; box-shadow:none; color:var(--muted); }
  .sources { margin-top:10px; font-size:13px; }
  .sources details { background:var(--surface-2); border:1px solid var(--line); border-radius:10px; padding:9px 13px; margin-top:6px; }
  .sources summary { cursor:pointer; font-weight:600; }
  .src-item { margin:9px 0; padding-bottom:9px; border-bottom:1px solid var(--line); }
  .src-item:last-child { border-bottom:none; padding-bottom:0; }
  .composer { position:fixed; bottom:0; left:0; right:0; background:var(--surface); border-top:1px solid var(--line); padding:14px 16px; }
  .composer .row { max-width:820px; margin:0 auto; display:flex; gap:8px; }
  #brand { width:170px; flex:0 0 auto; }
  #q { flex:1; }
  .cite { color:var(--accent); font-weight:600; text-decoration:none; }
  .cite:hover { text-decoration:underline; }
</style>
</head>
<body>
<header class="topbar">
  <a href="/" class="brand">ReviewBay</a>
  <span class="tag muted" style="font-size:13px">Answers cite real reviews</span>
  <span class="sp"></span>
  <nav class="nav">
    <a href="/start">Add brand</a>
    <a href="/dashboard">Dashboard</a>
    <a href="/compare">Compare</a>
    <a href="/chat" class="active">Chat</a>
  </nav>
</header>
<main id="chat" class="chatwrap">
  <div class="msg"><div class="bubble intro">Ask me what customers are saying about a brand. Every answer links back to the source review.</div></div>
</main>
<form id="form" class="composer">
  <div class="row">
    <select id="brand" title="Pick one of your brands"></select>
    <input id="q" placeholder="e.g. What do people complain about most?" autocomplete="off" required />
    <button id="send" class="btn" type="submit">Ask</button>
  </div>
</form>
<script>
const chat = document.getElementById('chat');
const form = document.getElementById('form');
const qEl = document.getElementById('q');
const brandEl = document.getElementById('brand');
const sendBtn = document.getElementById('send');
// Seamless handoff: /chat?brand=X (from the dashboard or compare) prefills the brand.
const _preBrand = new URLSearchParams(location.search).get('brand');
if (_preBrand) {
  const _intro = document.querySelector('#chat .bubble');
  if (_intro) _intro.textContent = 'Ask me what customers are saying about ' + _preBrand + '. Every answer links back to the source review.';
}
// Populate the brand dropdown so every question can be scoped to one brand,
// which narrows the vector search and keeps the answer focused.
function loadBrands(){
  const pre = (_preBrand || '').trim();
  if (pre && window.RB_Brands) RB_Brands.add(pre);  // arriving with ?brand= remembers it here
  const brands = window.RB_Brands ? RB_Brands.list() : [];
  RB_Brands.fillSelect(brandEl, { chosen: pre || brands[0] || '' });
  if (!brands.length){
    // No brands in this browser yet: point to onboarding and keep the box closed
    // so the chat never searches across brands the visitor has not added.
    const introEl = document.querySelector('#chat .bubble');
    if (introEl) introEl.innerHTML = 'Add a brand first, then I can tell you what its customers are saying. <a href="/start">Add a brand</a>.';
    qEl.disabled = true; sendBtn.disabled = true;
    qEl.placeholder = 'Add a brand to start chatting';
  }
}
loadBrands();

function add(role, html) {
  const wrap = document.createElement('div');
  wrap.className = 'msg ' + role;
  wrap.innerHTML = '<div class="bubble">' + html + '</div>';
  chat.appendChild(wrap);
  window.scrollTo(0, document.body.scrollHeight);
  return wrap;
}
function esc(s){ return (s||'').replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
// Turn each [n] citation in the answer into a link that opens that source.
function linkifyCitations(html, sources){
  return html.replace(/\[(\d+)\]/g, (m, n) => {
    const s = sources[parseInt(n, 10) - 1];
    return (s && s.source_url)
      ? `<a class="cite" href="${esc(s.source_url)}" target="_blank" rel="noopener">[${n}]</a>`
      : m;
  });
}

function renderSources(sources){
  if(!sources.length) return '';
  let items = sources.map(s =>
    `<div class="src-item">[${s.n}] <span class="pill">${esc(s.source)}</span>`
    + (s.rating!=null?`<span class="pill">${s.rating}/5</span>`:'')
    + (s.sentiment?`<span class="pill">${esc(s.sentiment)}</span>`:'')
    + ` <a href="${esc(s.source_url)}" target="_blank" rel="noopener">open source</a>`
    + `<div class="muted">${esc(s.excerpt)}</div></div>`
  ).join('');
  return `<div class="sources"><details open><summary>${sources.length} sources</summary>${items}</details></div>`;
}

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  const question = qEl.value.trim();
  if(!question) return;
  const brand = brandEl.value.trim();
  if(!brand){ return; }  // a brand is required, so the chat stays scoped to your list
  add('user', esc(question));
  qEl.value = '';
  sendBtn.disabled = true;
  const thinking = add('bot', '<span class="muted">Searching reviews</span>');
  try {
    const res = await fetch('/chat', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ question, brand })
    });
    const data = await res.json();
    thinking.querySelector('.bubble').innerHTML = linkifyCitations(esc(data.answer), data.sources || []) + renderSources(data.sources || []);
  } catch(err) {
    thinking.querySelector('.bubble').innerHTML = '<span class="muted">Something went wrong: ' + esc(String(err)) + '</span>';
  } finally {
    sendBtn.disabled = false;
    qEl.focus();
  }
});
</script>
</body>
</html>
