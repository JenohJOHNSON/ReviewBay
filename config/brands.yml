# Brands to monitor. This is your control panel: add a brand, its keywords, and
# which sources to scrape.
#
# sources: app_store | google_play for the Python worker.
#          Airbyte Cloud handles web | reddit | google_maps | yelp
#          | tripadvisor | instagram | facebook via config/airbyte_sources.yml.
#          The legacy direct ingestion runner can still use all sources locally.
#
#          app_store + google_play are FREE (no token — Apple's RSS feed and the
#          google-play-scraper library, respectively).
#          instagram/facebook are BEST-EFFORT (Meta blocks scraping) — if Apify
#          returns nothing the pass just continues and `web` covers it. facebook
#          also needs a page URL: env APIFY_FB_URL_<BRAND> (else it self-skips).
#          The rest run through Apify on one token.
#
# Start empty for the website flow. Brands added from /start are written to
# config/brands.dynamic.yml, then the worker picks them up on the next cycle.

default_sources:
  - app_store
  - google_play

brands: []

# ── Later, to go bigger, a brand can look like this: ──
#  - name: "Your Brand"
#    keywords: ["Your Brand", "YourBrandHandle"]
#    sources: ["web", "reddit", "google_maps", "yelp"]
#    limit: 50
