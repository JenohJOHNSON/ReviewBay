# Brands to monitor. This is your control panel: add a brand, its keywords, and
# which sources to scrape.
#
# sources: any of  web | firecrawl | trustpilot | app_store | google_play
#                 | reddit | google_maps | yelp | tripadvisor | instagram | facebook
#          web uses Tavily when TAVILY_API_KEY is set (cheaper), else the Apify
#          google-search. It also covers Reddit + YouTube for free (tagged Social).
#          firecrawl is OPT-IN deep search: it scrapes full page content (richer
#          text) and only runs for a brand that lists it here. Needs FIRECRAWL_API_KEY.
#          trustpilot is OPT-IN and self-hosted (Playwright + Selectolax, no per-page
#          fee). It uses the brand's `website` to find the Trustpilot page (or pin
#          env TRUSTPILOT_URL_<BRAND>). Needs the browser: `playwright install chromium`
#          (the ingestion Docker image installs it automatically).
#          app_store + google_play are FREE (no token, Apple's RSS feed and the
#          google-play-scraper library, respectively).
#          reddit: Reddit closed its API to self-service in late 2025 (needs
#          manual approval now), so we do NOT list it as a source. The `web`
#          search already surfaces Reddit threads for free and tags them as
#          "reddit" (Social). Only add `reddit` here if you have approved API
#          keys or accept the Apify actor's credit cost.
#          instagram/facebook are BEST-EFFORT (Meta blocks scraping): if Apify
#          returns nothing the pass just continues and `web` covers it. facebook
#          also needs a page URL: env APIFY_FB_URL_<BRAND> (else it self-skips).
#          The rest run through Apify on one token.
#
# 👉 FIRST TEST: we start with ONE brand and only the cheap "web" source, so a
#    free Apify plan barely spends anything. Change the name below to the brand
#    YOU want to track, then later add more sources / brands (examples at bottom).

default_sources:
  - web            # also covers Reddit + YouTube for free (tagged as Social)
  - app_store
  - google_play
  - google_maps
  - yelp
  - tripadvisor
  - facebook

brands:
  - name: "Blue Bottle Coffee"       # ← CHANGE THIS to the brand you care about
    keywords: ["Blue Bottle Coffee"]
    # web = Apify · app_store/google_play = free. instagram removed for now.
    sources: ["web", "app_store", "google_play"]
    limit: 50                        # aim for at least 50 samples per source

# ── Later, to go bigger, a brand can look like this: ──
#  - name: "Your Brand"
#    keywords: ["Your Brand", "Your Brand reddit"]  # a "... reddit" keyword pulls more Reddit threads via web
#    sources: ["web", "google_maps", "yelp"]
#    limit: 50
