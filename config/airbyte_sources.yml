# Airbyte Cloud staging tables to import into ReviewBay.
#
# Configure each Airbyte connection to write to the `airbyte` schema in Neon,
# then add one entry per destination table below. The worker reads recent rows,
# maps each Apify Dataset item into ReviewBay's normalized raw.reviews_raw shape,
# and lets the existing local ML enrichment populate marts.reviews.
#
# Supported mappers:
#   google_maps | yelp | reddit | tripadvisor | instagram | facebook | web | normalized
#
# Example:
# sources:
#   - table: airbyte.google_maps_reviews
#     brand: "Blue Bottle Coffee"
#     source: google_maps
#     mapper: google_maps

sources: []
