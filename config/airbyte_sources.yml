# Maps each Airbyte Cloud staging table (in the Neon `airbyte` schema) to the
# brand it belongs to and the mapper used to reshape its Apify dataset items into
# our NormalizedReview contract. The `source` name reuses the exact field
# mappings the direct Apify connectors already use
# (src/reviewbot/connectors/apify_source.py):
#   google_maps | yelp | tripadvisor | reddit | instagram | facebook
#
# Flow:  Apify actor -> dataset -> Airbyte "Apify Dataset" source -> Neon
#        `airbyte.<table>` -> (this) normalize -> raw.reviews_raw -> enrich -> marts
#
# App Store and Google Play are NOT here: they stay on the free Python connectors.
#
# After you create an Airbyte connection (see airbyte/README.md), add an entry
# with the table Airbyte writes to and the brand/mapper, then run:
#   python -m reviewbot.ingestion.airbyte_sync
#
# Empty by default, so the worker is a harmless no-op until you configure Airbyte.

sources: []
  # - table: airbyte.blue_bottle_google_maps   # table Airbyte's sync created
  #   brand: Blue Bottle Coffee
  #   source: google_maps
  # - table: airbyte.blue_bottle_reddit
  #   brand: Blue Bottle Coffee
  #   source: reddit
