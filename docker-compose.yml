# ReviewBay — cloud runtime.
#   worker : imports Airbyte Cloud staging rows, runs free app-store sources,
#            enriches reviews with local Python ML, and upserts into Neon.
#   api    : FastAPI website + OpenAI-backed review chatbot over Neon/pgvector.
#
# Neon Postgres, Airbyte Cloud, Apify, and OpenAI are managed/cloud, so there is
# no database, Airbyte, or LLM container here.

services:
  worker:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    env_file: .env
    restart: unless-stopped
    volumes:
      - ./config:/app/config:ro   # edit brands.yml without a rebuild
      - ./state:/app/state        # alert state (dedupe/baseline) persists here

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    env_file: .env
    restart: unless-stopped
    volumes:
      - ./config:/app/config   # read brands + append ones added via the onboarding UI
      - ./state:/app/state     # alert state (dedupe/baseline) persists here
    ports:
      - "8000:8000"
